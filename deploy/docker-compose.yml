# 可选：需要容器化 PostgreSQL / Phoenix 时再使用。
# 当前默认开发流程见仓库根目录 README（本地安装，不依赖 Docker）。
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: coc
      POSTGRES_PASSWORD: coc
      POSTGRES_DB: coc_ai_keeper
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coc -d coc_ai_keeper"]
      interval: 5s
      timeout: 5s
      retries: 5

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      PHOENIX_PORT: "6006"
    volumes:
      - phoenix_data:/phoenix/data

volumes:
  pgdata:
  phoenix_data:
